version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: mdm-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: mdm_system
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mdm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: mdm-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mdm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: mdm-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/mdm_system?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_change_this
      JWT_EXPIRE: 7d
      API_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAIL: admin@moveinsync.com
      ADMIN_PASSWORD: Admin@123456
      ADMIN_NAME: System Administrator
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - mdm-network

  # Frontend React App
  frontend:
    build: ./frontend
    container_name: mdm-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mdm-network

networks:
  mdm-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data: